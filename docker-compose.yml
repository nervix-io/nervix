services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: nervix-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    volumes:
      - ./tls/dev:/etc/kafka/secrets:ro,Z
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,SSL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092,SSL://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SSL:SSL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.keystore.p12
      KAFKA_SSL_KEYSTORE_CREDENTIALS: kafka_keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: kafka_key_creds
      KAFKA_SSL_KEYSTORE_TYPE: PKCS12

  pulsar:
    image: apachepulsar/pulsar:4.1.0
    container_name: nervix-pulsar
    command: ["bin/pulsar", "standalone"]
    ports:
      - "6650:6650"
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; assert urllib.request.urlopen('http://127.0.0.1:8080/admin/v2/brokers/health').read().decode().strip() == 'ok'\" >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  pulsar-tls:
    image: apachepulsar/pulsar:4.1.0
    container_name: nervix-pulsar-tls
    command: ["sh", "/pulsar/bin/start-tls.sh"]
    ports:
      - "6651:6651"
    volumes:
      - ./docker/pulsar/start-tls.sh:/pulsar/bin/start-tls.sh:ro,Z
      - ./tls/dev:/pulsar/certs:ro,Z
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import ssl, urllib.request; ctx = ssl._create_unverified_context(); assert urllib.request.urlopen('https://127.0.0.1:8443/admin/v2/brokers/health', context=ctx).read().decode().strip() == 'ok'\" >/dev/null 2>&1",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: nervix-rabbitmq
    ports:
      - "5672:5672"
      - "5671:5671"
      - "15672:15672"
      - "15671:15671"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro,Z
      - ./tls/dev:/etc/rabbitmq/certs:ro,Z

  redis:
    image: redis:7
    container_name: nervix-redis
    user: "0:0"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
      - "6380:6380"
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro,Z
      - ./tls/dev:/etc/redis/certs:ro,Z

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: nervix-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: nervix
      CLICKHOUSE_DB: default
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null 'http://127.0.0.1:8123/ping'"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  clickhouse-tls:
    image: clickhouse/clickhouse-server:25.3
    container_name: nervix-clickhouse-tls
    ports:
      - "8124:8443"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: nervix
      CLICKHOUSE_DB: default
    volumes:
      - ./docker/clickhouse/https.xml:/etc/clickhouse-server/config.d/https.xml:ro,Z
      - ./tls/dev:/etc/clickhouse-server/certs:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O /dev/null 'https://127.0.0.1:8443/ping'"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  postgres:
    image: postgres:17
    container_name: nervix-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nervix
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  postgres-tls:
    image: postgres:17
    container_name: nervix-postgres-tls
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -euo pipefail
        cp /certs/node.pem /tmp/postgres-server.crt
        cp /certs/node-key.pem /tmp/postgres-server.key
        cp /certs/ca.pem /tmp/postgres-ca.pem
        chown postgres:postgres /tmp/postgres-server.crt /tmp/postgres-server.key /tmp/postgres-ca.pem
        chmod 600 /tmp/postgres-server.key
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=/tmp/postgres-server.crt \
          -c ssl_key_file=/tmp/postgres-server.key \
          -c ssl_ca_file=/tmp/postgres-ca.pem
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nervix
      POSTGRES_DB: postgres
    volumes:
      - ./tls/dev:/certs:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  mysql:
    image: mysql:8.4
    container_name: nervix-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: nervix
      MYSQL_DATABASE: nervix
      MYSQL_USER: nervix
      MYSQL_PASSWORD: nervix
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -unervix -pnervix"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  mysql-tls:
    image: mysql:8.4
    container_name: nervix-mysql-tls
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -euo pipefail
        cp /certs/node.pem /tmp/mysql-server.crt
        cp /certs/node-key.pem /tmp/mysql-server.key
        cp /certs/ca.pem /tmp/mysql-ca.pem
        chown mysql:mysql /tmp/mysql-server.crt /tmp/mysql-server.key /tmp/mysql-ca.pem
        chmod 600 /tmp/mysql-server.key
        exec docker-entrypoint.sh mysqld \
          --ssl-ca=/tmp/mysql-ca.pem \
          --ssl-cert=/tmp/mysql-server.crt \
          --ssl-key=/tmp/mysql-server.key \
          --require-secure-transport=ON
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: nervix
      MYSQL_DATABASE: nervix
      MYSQL_USER: nervix
      MYSQL_PASSWORD: nervix
    volumes:
      - ./tls/dev:/certs:ro,Z
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -unervix -pnervix --ssl-ca=/tmp/mysql-ca.pem",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  mongodb:
    image: mongo:7.0
    container_name: nervix-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: nervix
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username root --password nervix --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })'",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  mongodb-tls:
    image: mongo:7.0
    container_name: nervix-mongodb-tls
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -euo pipefail
        cat /certs/node-key.pem /certs/node.pem > /tmp/mongodb-server.pem
        cp /certs/ca.pem /tmp/mongodb-ca.pem
        chown mongodb:mongodb /tmp/mongodb-server.pem /tmp/mongodb-ca.pem
        chmod 600 /tmp/mongodb-server.pem
        exec docker-entrypoint.sh mongod \
          --bind_ip_all \
          --tlsMode requireTLS \
          --tlsCertificateKeyFile /tmp/mongodb-server.pem \
          --tlsCAFile /tmp/mongodb-ca.pem \
          --tlsAllowConnectionsWithoutCertificates
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: nervix
    volumes:
      - ./tls/dev:/certs:ro,Z
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --tls --tlsCAFile /tmp/mongodb-ca.pem --username root --password nervix --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })'",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  mosquitto:
    image: emqx/emqx:5.8.4
    container_name: nervix-mosquitto
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./tls/dev:/mosquitto/certs:ro,Z
    environment:
      EMQX_LISTENERS__TCP__DEFAULT__BIND: '"0.0.0.0:1883"'
      EMQX_LISTENERS__SSL__DEFAULT__BIND: '"0.0.0.0:8883"'
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CACERTFILE: /mosquitto/certs/ca.pem
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE: /mosquitto/certs/node.pem
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE: /mosquitto/certs/node-key.pem
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__VERIFY: verify_none
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__FAIL_IF_NO_PEER_CERT: "false"

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: nervix-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
    ports:
      - "9090:9090"

  prometheus-tls:
    image: prom/prometheus:v3.3.1
    container_name: nervix-prometheus-tls
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
      - "--web.listen-address=:9443"
      - "--web.config.file=/etc/prometheus/web.yml"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
      - ./docker/prometheus/web.yml:/etc/prometheus/web.yml:ro,Z
      - ./tls/dev:/etc/prometheus/certs:ro,Z
    ports:
      - "9443:9443"

  quickwit:
    image: quickwit/quickwit:v0.8.2
    container_name: nervix-quickwit
    command: ["run"]
    ports:
      - "7280:7280"
      - "4317:7281"
    environment:
      QW_ENABLE_OTLP_ENDPOINT: "true"
      QW_ENABLE_JAEGER_ENDPOINT: "true"
      QW_ENABLE_OPENTELEMETRY_OTLP_EXPORTER: "true"
      QW_DISABLE_TELEMETRY: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:7281
    volumes:
      - quickwit-data:/quickwit/qwdata

  jaeger:
    image: jaegertracing/jaeger-query:1.60
    container_name: nervix-jaeger
    depends_on:
      - quickwit
    ports:
      - "16686:16686"
    environment:
      SPAN_STORAGE_TYPE: grpc
      GRPC_STORAGE_SERVER: quickwit:7281
      GRPC_STORAGE_TLS: "false"

  nats:
    image: nats:2.11-alpine
    container_name: nervix-nats
    ports:
      - "4222:4222"

  nats-tls:
    image: nats:2.11-alpine
    container_name: nervix-nats-tls
    command: ["-c", "/etc/nats/nats-tls.conf"]
    ports:
      - "4223:4223"
    volumes:
      - ./docker/nats/nats-tls.conf:/etc/nats/nats-tls.conf:ro,Z
      - ./tls/dev:/etc/nats/certs:ro,Z

  elasticmq:
    image: softwaremill/elasticmq-native:1.6.12
    container_name: nervix-elasticmq
    ports:
      - "9324:9324"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null 'http://127.0.0.1:9324/?Action=ListQueues'"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  elasticmq-tls:
    image: nginx:1.27-alpine
    container_name: nervix-elasticmq-tls
    depends_on:
      elasticmq:
        condition: service_healthy
    ports:
      - "9325:9325"
    volumes:
      - ./docker/elasticmq/nginx.conf:/etc/nginx/conf.d/default.conf:ro,Z
      - ./tls/dev:/etc/nginx/certs:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O /dev/null 'https://127.0.0.1:9325/?Action=ListQueues'"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 2s

  rustfs-perms:
    image: alpine:3.21
    container_name: nervix-rustfs-perms
    volumes:
      - rustfs-data:/data
    command: ["chown", "-R", "10001:10001", "/data"]

  rustfs:
    image: rustfs/rustfs:latest
    container_name: nervix-rustfs
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully
    command: ["/data"]
    ports:
      - "9900:9000"
      - "9901:9001"
    environment:
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs-data:/data

  rustfs-init:
    image: amazon/aws-cli:2.17.65
    container_name: nervix-rustfs-init
    depends_on:
      rustfs:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    environment:
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_DEFAULT_REGION: us-east-1
    command:
      - |
        set -e
        for attempt in $(seq 1 60); do
          if aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket nervix-iceberg 2>/tmp/rustfs-bucket.err; then
            touch /tmp/rustfs-init-ready
            while :; do sleep 3600; done
          fi
          if grep -q 'BucketAlready' /tmp/rustfs-bucket.err; then
            touch /tmp/rustfs-init-ready
            while :; do sleep 3600; done
          fi
          sleep 1
        done
        cat /tmp/rustfs-bucket.err >&2
        exit 1
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/rustfs-init-ready"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 1s

  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.10.1
    container_name: nervix-iceberg-rest
    depends_on:
      rustfs-init:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://nervix-iceberg/warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://rustfs:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"

  datalake-iceberg-init:
    image: curlimages/curl:8.11.1
    container_name: nervix-datalake-iceberg-init
    depends_on:
      iceberg-rest:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init/init-datalake.sh"]
    environment:
      ICEBERG_REST_URI: http://iceberg-rest:8181
      ICEBERG_NAMESPACE: datalake_demo
      ICEBERG_TABLE_ROOT: s3://nervix-iceberg/tables
      ICEBERG_INIT_HOLD: "true"
    volumes:
      - ./docker/iceberg-rest/init-datalake.sh:/init/init-datalake.sh:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/datalake-iceberg-init-ready"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 1s

  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: nervix-fake-gcs
    command:
      [
        "-scheme",
        "http",
        "-port",
        "4443",
        "-backend",
        "filesystem",
        "-filesystem-root",
        "/data",
        "-public-host",
        "127.0.0.1:4443",
        "-external-url",
        "http://127.0.0.1:4443",
      ]
    ports:
      - "4443:4443"
    volumes:
      - fake-gcs-data:/data

  fake-gcs-init:
    image: curlimages/curl:8.11.1
    container_name: nervix-fake-gcs-init
    profiles: ["init"]
    depends_on:
      fake-gcs:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for attempt in $(seq 1 60); do
          if curl -fsS -X POST -H 'Content-Type: application/json' -d '{"name":"nervix-iceberg"}' 'http://fake-gcs:4443/storage/v1/b?project=nervix' >/tmp/fake-gcs-bucket.out 2>/tmp/fake-gcs-bucket.err; then
            exit 0
          fi
          if curl -fsS 'http://fake-gcs:4443/storage/v1/b/nervix-iceberg' >/dev/null 2>&1; then
            exit 0
          fi
          sleep 1
        done
        cat /tmp/fake-gcs-bucket.err >&2
        exit 1

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: nervix-azurite
    command:
      [
        "azurite-blob",
        "--blobHost",
        "0.0.0.0",
        "--loose",
        "--skipApiVersionCheck",
        "--location",
        "/data",
      ]
    ports:
      - "10000:10000"
    volumes:
      - azurite-data:/data

  azurite-init:
    image: mcr.microsoft.com/azure-cli:latest
    container_name: nervix-azurite-init
    profiles: ["init"]
    depends_on:
      azurite:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    environment:
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
    command:
      - |
        set -e
        for attempt in $(seq 1 60); do
          if az storage container create --name nervix-iceberg --connection-string "$$AZURE_STORAGE_CONNECTION_STRING" >/tmp/azurite-container.out 2>/tmp/azurite-container.err; then
            exit 0
          fi
          sleep 1
        done
        cat /tmp/azurite-container.err >&2
        exit 1

  mock-server:
    build:
      context: .
      dockerfile: docker/mock-server/Dockerfile
    pull_policy: build
    container_name: nervix-mock-server
    ports:
      - "18080:8080"
      - "18443:8443"
    volumes:
      - ./tls/dev:/certs:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/http/health').read()\" >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 2s

volumes:
  azurite-data:
  fake-gcs-data:
  quickwit-data:
  rustfs-data:
