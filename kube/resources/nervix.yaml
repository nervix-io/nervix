apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nervix
  namespace: nervix
  labels:
    app.kubernetes.io/name: nervix
    app.kubernetes.io/component: application
spec:
  serviceName: nervix-headless
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app.kubernetes.io/name: nervix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nervix
        app.kubernetes.io/component: application
    spec:
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      terminationGracePeriodSeconds: 30
      containers:
        - name: nervix
          image: ghcr.io/nervix-io/nervix:20260505051615-debian
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
          command:
            - /bin/sh
            - -ec
            - |
              ordinal="${HOSTNAME##*-}"
              node_number=$((ordinal + 1))
              node_id="node-${node_number}"
              pod_fqdn="${HOSTNAME}.nervix-headless.${POD_NAMESPACE}.svc.cluster.local"
              grpc_node_port=$((31391 + ordinal))
              if [ "${ordinal}" = "0" ]; then
                bootstrap_args="--allow-bootstrap"
              else
                bootstrap_args="--cluster-bootstrap-host nervix-0.nervix-headless.${POD_NAMESPACE}.svc.cluster.local:47392"
              fi

              exec /usr/local/bin/nervix-server \
                --addr 0.0.0.0:47391 \
                --grpc-mode http \
                --grpc-advertise-addr "${HOST_IP}:${grpc_node_port}" \
                --http-listen-addr 0.0.0.0:8080 \
                --https-listen-addr 0.0.0.0:8443 \
                --observability-listen-addr 0.0.0.0:9090 \
                --cluster-id nervix-kube \
                --node-id "${node_id}" \
                --cluster-listen-addr 0.0.0.0:47392 \
                --cluster-advertise-addr "${pod_fqdn}:47392" \
                --cluster-api-mode http \
                --cluster-api-listen-addr 0.0.0.0:47393 \
                --cluster-api-advertise-addr "${pod_fqdn}:47393" \
                --interconnect-mode http \
                --interconnect-listen-addr 0.0.0.0:47395 \
                --interconnect-advertise-addr "${pod_fqdn}:47395" \
                --replica-count 3 \
                --db-path /var/lib/nervix/db \
                ${bootstrap_args}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: RUST_LOG
              value: info,nervix=info
          ports:
            - name: grpc
              containerPort: 47391
              protocol: TCP
            - name: gossip
              containerPort: 47392
              protocol: UDP
            - name: cluster-api
              containerPort: 47393
              protocol: TCP
            - name: interconnect
              containerPort: 47395
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: https
              containerPort: 8443
              protocol: TCP
            - name: observability
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: observability
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /livez
              port: observability
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /livez
              port: observability
            periodSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/nervix
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: nervix
          app.kubernetes.io/component: application
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
