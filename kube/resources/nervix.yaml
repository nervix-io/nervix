apiVersion: v1
kind: Service
metadata:
  name: nervix-headless
  namespace: nervix
  labels:
    app.kubernetes.io/name: nervix
    app.kubernetes.io/component: application
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: nervix
  ports:
    - name: grpc
      port: 47391
      targetPort: grpc
      protocol: TCP
    - name: gossip
      port: 47392
      targetPort: gossip
      protocol: UDP
    - name: cluster-api
      port: 47393
      targetPort: cluster-api
      protocol: TCP
    - name: interconnect
      port: 47395
      targetPort: interconnect
      protocol: TCP
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: https
      port: 8443
      targetPort: https
      protocol: TCP
    - name: observability
      port: 9090
      targetPort: observability
      protocol: TCP
