apiVersion: v1
kind: Service
metadata:
  name: {{ include "mock-server.fullname" . }}
  labels:
    {{- include "mock-server.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "mock-server.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: https
      port: {{ .Values.service.httpsPort }}
      targetPort: https
