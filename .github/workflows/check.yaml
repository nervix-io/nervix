name: Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

env:
  TINYGO_VERSION: "0.41.1"

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventional-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: false
      - uses: CondeNast/conventional-pull-request-action@v0.2.0
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          ignoreCommits: 'true'
          commitlintRulesPath: ./commitlint.config.js

  checks:
    name: checks
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - uses: bufbuild/buf-setup-action@v1

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack,typos-cli,cargo-audit,cargo-mutants,taplo-cli,just,cargo-autoinherit,toml-cli,trunk,wild-linker

      - name: Install Latest LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22

      - name: Configure cargo
        run: |
          tee <<EOF > ~/.cargo/config.toml
          [target.x86_64-unknown-linux-gnu]
          ar = "llvm-ar-22"
          linker = "clang-22"
          rustflags = ["-Clink-arg=--ld-path=wild"]
          EOF

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.26" # Use your desired Go version

      - name: Install TinyGo
        run: |
          set -euo pipefail
          arch="$(dpkg --print-architecture)"
          case "${arch}" in
            amd64|arm64) ;;
            *) echo "unsupported TinyGo CI architecture: ${arch}" >&2; exit 1 ;;
          esac
          curl -fsSLo /tmp/tinygo.deb "https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_${arch}.deb"
          sudo dpkg -i /tmp/tinygo.deb
          tinygo version

      - name: Install dockerfmt
        run: |
          go install github.com/reteps/dockerfmt@latest

      - name: Install ghokin
        run: |
          go install github.com/antham/ghokin/v3@v3.9.0

      - name: Install apt deps
        run: |
          sudo apt update
          sudo apt install -y \
            libcurl4-openssl-dev \
            protobuf-compiler

      - name: Setup flatc
        uses: Nugine/setup-flatc@v1
        with:
          version: "25.12.19"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Blacksmith cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: deps
        run: just deps

      - name: Validate
        run: just validate-ci

  tests:
    name: tests
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 60
    env:
      NO_COLOR: "1"
      CARGO_TERM_COLOR: never
      RUST_LOG_STYLE: never
    steps:
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt,miri

      - uses: bufbuild/buf-setup-action@v1

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack,cargo-mutants,just,toml-cli,cargo-llvm-cov,trunk,cargo-crap,wild-linker

      - name: Install Latest LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22

      - name: Configure cargo
        run: |
          tee <<EOF > ~/.cargo/config.toml
          [target.x86_64-unknown-linux-gnu]
          ar = "llvm-ar-22"
          linker = "clang-22"
          rustflags = ["-Clink-arg=--ld-path=wild"]
          EOF

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install TinyGo
        run: |
          set -euo pipefail
          arch="$(dpkg --print-architecture)"
          case "${arch}" in
            amd64|arm64) ;;
            *) echo "unsupported TinyGo CI architecture: ${arch}" >&2; exit 1 ;;
          esac
          curl -fsSLo /tmp/tinygo.deb "https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_${arch}.deb"
          sudo dpkg -i /tmp/tinygo.deb
          tinygo version

      - name: Install dockerfmt
        run: |
          go install github.com/reteps/dockerfmt@latest

      - name: Install playwright
        run: |
          npm install -g playwright

      - name: Install apt deps
        run: |
          sudo apt update
          sudo apt install -y \
            libcurl4-openssl-dev \
            protobuf-compiler

      - name: Setup flatc
        uses: Nugine/setup-flatc@v1
        with:
          version: "25.12.19"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Blacksmith cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: deps
        run: |
            just deps-down || true
            just deps

      - name: Tests Coverage
        run: |
            just test-coverage

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: tests/logs
          if-no-files-found: ignore

      - name: Stop docker deps
        if: always()
        run: |
            just deps-down || true

  build-book:
    name: build-book
    needs: ["tests"]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.4.40"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: just,toml-cli

      - name: Compute docs target
        id: docs
        run: |
            docs_target="pr-${{ github.event.pull_request.number }}-${{ github.sha }}"
            docs_url="https://docs.nervix.io/${docs_target}/"
            echo "target=${docs_target}" >> "$GITHUB_OUTPUT"
            echo "url=${docs_url}" >> "$GITHUB_OUTPUT"

      - name: Publish Book
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
            just publish-book pr-${{ github.event.pull_request.number }}-${{ github.sha }} "$CLOUDFLARE_ZONE_ID"

      - name: Publish docs link to build summary
        run: |
            {
              echo "## Documentation Preview"
              echo
              echo "- Target: \`${{ steps.docs.outputs.target }}\`"
              echo "- URL: ${{ steps.docs.outputs.url }}"
            } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment docs link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- nervix-docs-preview -->';
            const body = `${marker}
            Documentation preview for this PR:

            - Target: \`${{ steps.docs.outputs.target }}\`
            - URL: ${{ steps.docs.outputs.url }}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
