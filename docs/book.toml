[book]
authors = ["Nervix Contributors"]
description = "User manual and architecture reference for Nervix."
language = "en"
#multilingual = false
src = "src"
title = "The Nervix Book"

[build]
build-dir = "book"
create-missing = false

[output.html]
additional-css = ["theme/nervix.css"]
default-theme = "navy"
edit-url-template = "https://github.com/nervix-io/nervix/edit/main/docs/{path}"
favicon-svg = "theme/nervix-mark.svg"
git-repository-url = "https://github.com/nervix-io/nervix"
preferred-dark-theme = "navy"

[output.markdown]

[output.llms]
command = "../scripts/mdbook_llms.py"
description = "Public NSPL configuration reference for Nervix."
include = [
  "nspl-overview.md",
  "domains-and-time.md",
  "schemas-and-codecs.md",
  "resources.md",
  "relay.md",
  "ingestors.md",
  "processors.md",
  "wasm-processor-guests.md",
  "wasm-guest-sdk.md",
  "emitters.md",
  "filter-map-functions.md",
  "udfs.md",
  "lookups.md",
  "sessions.md",
  "metrics-and-observability.md",
  "client-library.md",
  "examples.md",
]
title = "Nervix NSPL Documentation"

# [output.pandoc]
# profile.pdf = {}
