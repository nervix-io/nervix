listeners.tcp.default = 5672
listeners.ssl.default = 5671
ssl_options.cacertfile = /etc/rabbitmq/certs/ca.pem
ssl_options.certfile = /etc/rabbitmq/certs/node.pem
ssl_options.keyfile = /etc/rabbitmq/certs/node-key.pem
ssl_options.verify = verify_none
ssl_options.fail_if_no_peer_cert = false

management.tcp.port = 15672
management.ssl.port = 15671
management.ssl.cacertfile = /etc/rabbitmq/certs/ca.pem
management.ssl.certfile = /etc/rabbitmq/certs/node.pem
management.ssl.keyfile = /etc/rabbitmq/certs/node-key.pem
management.ssl.verify = verify_none
management.ssl.fail_if_no_peer_cert = false
